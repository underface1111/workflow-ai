name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      # secrets cannot be used in `if:` — requires SONAR_* repository secrets
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        uses: SonarSource/sonarqube-scan-action@v4

  e2e-robot:
    runs-on: ubuntu-latest
    needs: build-test-sonar
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node app
        run: npm ci

      - name: Install Robot dependencies
        run: pip install -r tests/e2e-robot/requirements.txt

      - name: Start API and run critical E2E
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break
            sleep 1
          done
          robot --outputdir robot-results --include critical tests/e2e-robot/suites/critical

      - name: Publish Robot results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: robot-results/
